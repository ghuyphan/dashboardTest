<div class="page-container">
  <div class="page-content">
    <!-- HIS Mock Tab Header -->
    <div class="mock-tab-header">
      <div class="mock-tab active">
        <i class="fas fa-file-export mock-tab-icon"></i>
        <span>Xuất File EMR</span>
        <button type="button" class="mock-tab-close" (click)="onClose()">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Filter Section using projected ng-content -->
    <div class="filter-section-wrapper">
      <div class="filter-section-title">Thông tin tìm kiếm</div>
      <app-date-filter
        [showSubmitButton]="false"
        [defaultRange]="'thisMonth'"
        [isLoading]="isLoading()"
        (filterSubmit)="onDateFilterChange($event)">
        <!-- Custom Patient ID filter projected adjacent to Datepickers -->
        <div custom-filters class="custom-emr-filters">
          <div class="radio-group-container">
            <label class="radio-label-custom">
              <input
                type="radio"
                name="searchType"
                [value]="'mayte'"
                [checked]="selectedSearchType() === 'mayte'"
                (change)="selectedSearchType.set('mayte')" />
              <span class="custom-radio-circle"></span>
              <span class="radio-text">Mã y tế</span>
            </label>
          </div>
          <div class="input-field-container">
            <input
              type="text"
              class="emr-input-control"
              placeholder="Nhập mã y tế..."
              [(ngModel)]="searchPatientId"
              (keyup.enter)="onSearch()"
              [disabled]="isLoading()" />
            <span class="emr-input-icon-right"
              ><i class="fas fa-id-card"></i
            ></span>
          </div>
        </div>

        <!-- Custom Action Buttons projected to the right -->
        <div custom-actions class="custom-emr-actions">
          <button
            type="button"
            class="btn btn-outline-primary"
            (click)="onSearch()"
            [disabled]="isLoading()">
            <i
              class="fas"
              [ngClass]="isLoading() ? 'fa-spinner fa-spin' : 'fa-search'"></i>
            <span>Xem</span>
          </button>

          <button
            type="button"
            class="btn btn-secondary-emr"
            (click)="onExportEMR()"
            [disabled]="isLoading() || !selectedAdmission() || isExporting()">
            <i
              class="fas"
              [ngClass]="
                isExporting() ? 'fa-spinner fa-spin' : 'fa-file-medical'
              "></i>
            <span>Kết xuất file EMR</span>
          </button>

          <button
            type="button"
            class="btn btn-primary"
            (click)="onPrintSelectedFiles()"
            [disabled]="
              isLoading() || selectedFiles().length === 0 || isPrinting()
            ">
            <i
              class="fas"
              [ngClass]="isPrinting() ? 'fa-spinner fa-spin' : 'fa-print'"></i>
            <span>In ({{ selectedFiles().length }})</span>
          </button>

          <button type="button" class="btn btn-ghost" (click)="onClose()">
            <i class="fas fa-times"></i>
            <span>Đóng</span>
          </button>
        </div>
      </app-date-filter>
    </div>

    <!-- Side-by-Side Panels Grid -->
    <div class="split-layout-grid">
      <!-- Left Panel: Admissions List (40% width) -->
      <div class="split-card split-left">
        <div class="panel-header-bar">
          <div class="panel-title-wrapper">
            <i class="fas fa-hospital-user panel-icon text-primary"></i>
            <h3 class="panel-main-title">Danh sách tiếp nhận</h3>
          </div>
          <span class="badge-count" *ngIf="admissions().length > 0">
            {{ admissions().length }} lượt
          </span>
        </div>

        <div class="panel-table-container">
          <app-reusable-table
            [data]="admissions()"
            [columns]="admissionColumns"
            [isLoading]="isLoading()"
            [enableMultiSelect]="false"
            [showPaginator]="false"
            [trackByField]="'STT'"
            [emptyStateText]="'Không tìm thấy lượt tiếp nhận nào.'"
            (rowClick)="onAdmissionSelected($event)">
          </app-reusable-table>
        </div>
      </div>

      <!-- Right Panel: Signed Files List (60% width) -->
      <div class="split-card split-right">
        <div class="panel-header-bar">
          <div class="panel-title-wrapper">
            <i class="fas fa-file-signature panel-icon text-success"></i>
            <h3 class="panel-main-title">Danh sách file đã ký</h3>
          </div>
          <div class="detail-info-wrapper" *ngIf="selectedAdmission()">
            <span class="patient-name-badge">
              <i class="fas fa-user-circle"></i>
              {{ selectedAdmission()?.tenBenhNhan }}
            </span>
          </div>
        </div>

        <div class="panel-table-container">
          <app-reusable-table
            [data]="signedFiles()"
            [columns]="signedFileColumns"
            [isLoading]="isLoading()"
            [enableMultiSelect]="true"
            [showPaginator]="false"
            [rowActions]="fileRowActions"
            [trackByField]="'STT'"
            [emptyStateText]="
              selectedAdmission()
                ? 'Không tìm thấy file đã ký nào cho lượt tiếp nhận này.'
                : 'Vui lòng chọn lượt tiếp nhận ở cột bên trái.'
            "
            (rowAction)="handleFileAction($event)"
            (selectionChanged)="onFilesSelectionChanged($event)">
          </app-reusable-table>
        </div>
      </div>
    </div>
  </div>
</div>
